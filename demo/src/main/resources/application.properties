spring.application.name=payment-system-backend

server.port=${PORT:8080}

# Database — uses Railway env vars in production, falls back to local values
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://crossover.proxy.rlwy.net:36788/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:LkGfxGLWqxJkJWxdmhCgxMRRFkDzFgei}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Connection pool settings for Railway
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# Twilio SMS (optional)
twilio.account-sid=${TWILIO_ACCOUNT_SID:YOUR_TWILIO_ACCOUNT_SID}
twilio.auth-token=${TWILIO_AUTH_TOKEN:YOUR_TWILIO_AUTH_TOKEN}
twilio.phone-number=${TWILIO_PHONE_NUMBER:YOUR_TWILIO_PHONE_NUMBER}